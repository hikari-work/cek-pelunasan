services:
  mongodb:
    image: mongo:6.0
    container_name: cek-pelunasan-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=password
      - MONGO_INITDB_DATABASE=tagihan
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network

  app:
    build: .
    container_name: cek-pelunasan
    restart: always
    depends_on:
      - mongodb
    env_file: .env
    environment:
      # Path SQLite untuk session whatsmeow. Volume di bawah memastikan
      # session persist antar restart — kalau hilang, harus pair ulang via QR.
      - WA_DB_PATH=/app/data/wa.db
      - SPRING_DATA_MONGODB_URI=mongodb://root:password@mongodb:27017/tagihan?authSource=admin
    ports:
      - "${SERVER_PORT:-8080}:8080"
    volumes:
      - wa-session:/app/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  wa-session:
  mongodb_data:
