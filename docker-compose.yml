services:
  app:
    build: .
    container_name: cek-pelunasan
    restart: always
    env_file: .env
    environment:
      # Path SQLite untuk session whatsmeow. Volume di bawah memastikan
      # session persist antar restart — kalau hilang, harus pair ulang via QR.
      - WA_DB_PATH=/app/data/wa.db
    ports:
      - "${SERVER_PORT:-8080}:8080"
    volumes:
      - wa-session:/app/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  wa-session:
