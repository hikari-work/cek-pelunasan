name: Build GraalVM native image

on:
  push:
    branches: [ main, feat/native-build ]
  pull_request:
  workflow_dispatch:

jobs:
  build-native:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM 21
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          cache: 'maven'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build native image
        run: ./mvnw -B -Pnative -DskipTests native:compile

      - name: Smoke test binary
        run: |
          file target/cek-pelunasan
          ls -lh target/cek-pelunasan

      - name: Upload native binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: cek-pelunasan-linux-amd64
          path: target/cek-pelunasan
          retention-days: 14

      - name: Create release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: target/cek-pelunasan
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
