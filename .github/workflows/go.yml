name: Build Go binary

on:
  push:
    branches: [ main, feat/migrate-golang ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

      - name: Build
        run: |
          mkdir -p bin
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -trimpath -ldflags="-s -w" \
              -o bin/cekpelunasan-linux-amd64 ./cmd/cekpelunasan

      - name: Smoke test binary
        run: |
          file bin/cekpelunasan-linux-amd64
          ls -lh bin/cekpelunasan-linux-amd64

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: cekpelunasan-linux-amd64
          path: bin/cekpelunasan-linux-amd64
          retention-days: 14

      - name: Create release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: bin/cekpelunasan-linux-amd64
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
